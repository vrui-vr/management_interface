<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRUI Interface</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div id="actionMenu" class="action-menu hidden"></div>

    <div class="sidebar">
      <div
        class="title-row"
        style="
          display: flex;
          align-items: center;
          gap: 1rem;
          margin-bottom: 1rem;
        "
      >
        <img
          src="images/vruilogo.jpg"
          alt="VRUI Logo"
          style="
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
          "
        />
        <h2>VRUI Interface</h2>
        <select id="systemSelect" onchange="changeSystem(this.value)"></select>
        <button class="add-btn" onclick="addSystem()">+</button>
      </div>
      <div class="button-section">
        <p><strong id="targetLabel"></strong></p>

        <button
          class="button"
          id="btn-vrtracker"
          onclick="send('vrtracker_on')"
        >
          Start VR Tracker
        </button>
        <button class="button" id="btn-headset" onclick="send('getServerStatus')">
          Start VR Compositor
        </button>

        <button class="button" id="btn-connect" onclick="send('connect')">
          Connect Controllers
        </button>

        <button class="button" id="btn-run" onclick="send('run')">
          Run Program
        </button>

        <button
          class="button button-danger"
          id="btn-disconnect"
          onclick="send('disconnect')"
        >
          Disconnect System
        </button>

        <button
          class="button button-danger"
          id="btn-restart"
          onclick="send('restart')"
        >
          Restart VR Tracker
        </button>

        <button
          class="button button-danger"
          id="btn-shutdown"
          onclick="send('shutdown')"
        >
          Shutdown System
        </button>
      </div>
    </div>

    <div class="main">
      <div class="system-section" id="systemContainer"></div>
      <div class="console-section">
        <div
          class="console-title"
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <span>Console Output</span>
          <div class="console-filter">
            <button id="filterToggle" class="filter-toggle">▼</button>
            <div id="filterMenu" class="filter-menu">
              <!-- Dynamically filled with checkboxes -->
            </div>
          </div>
        </div>
        <div id="consoleOutput" class="console-box"></div>
        <div id="commandPrompt" style="margin-top: 1rem">
          <input
            type="text"
            id="commandInput"
            placeholder="Enter command (e.g. reset)"
          />
          <button onclick="sendConsoleCommand()">Send</button>
        </div>
      </div>
    </div>

    <script src="js/Main.js"></script>
  </body>
</html>
