<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRUI Interface</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="sidebar">
      <div
        class="title-row"
        style="
          display: flex;
          align-items: center;
          gap: 1rem;
          margin-bottom: 1rem;
        "
      >
        <img
          src="images/vruilogo.jpg"
          alt="VRUI Logo"
          style="
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
          "
        />
        <h2>VRUI Interface</h2>
        <select id="systemSelect" onchange="changeSystem(this.value)"></select>
        <button class="add-btn" onclick="addDevice()">+</button>
      </div>
      <div class="button-section">
        <p><strong id="targetLabel"></strong></p>
        <button class="button" onclick="send('power')">Turn on System</button>
        <button class="button" onclick="send('connect')">
          Connect Controllers
        </button>
        <button class="button" onclick="send('disconnect')">
          Disconnect Devices
        </button>
        <button class="button" onclick="send('run')">Run Program</button>
      </div>
    </div>

    <div class="main">
      <div class="device-section" id="deviceContainer"></div>
      <div class="console-section">
        <div class="console-title">Console Output</div>
        <div id="consoleOutput" class="console-box">Waiting for input...</div>
        <div id="commandPrompt" style="margin-top: 1rem">
          <input
            type="text"
            id="commandInput"
            placeholder="Enter command (e.g. reset)"
          />
          <button onclick="sendCustomCommand()">Send</button>
        </div>
      </div>
    </div>

    <script src="js/Main.js"></script>
  </body>
</html>
