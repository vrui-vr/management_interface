<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRUI Interface</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div id="actionMenu" class="action-menu hidden"></div>

    <div class="sidebar">
      <!-- Sidebar Header with Logo, Title, and Theme Toggle -->
      <div class="sidebar-header">
        <div class="sidebar-header-left">
          <img
            src="images/vruilogo.jpg"
            alt="VRUI Logo"
            class="sidebar-logo"
          />
          <h2 class="sidebar-title">VRUI Interface</h2>
        </div>
        <div class="sidebar-header-right">
          <button class="theme-toggle" aria-label="Toggle dark mode">
            <div class="theme-toggle-slider">
              <svg class="theme-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
              <svg class="theme-icon moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </div>
          </button>
        </div>
      </div>

      <!-- Device Selector Dropdown (replaces the old title-row) -->
      <div class="device-selector-section">
        <div class="device-selector-wrapper">
          <div class="device-selector-title" id="deviceSelectorToggle">
            <span id="deviceSelectorText">Target: localhost</span>
            <svg class="device-selector-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div id="deviceDropdown" class="device-dropdown">
            <!-- Will be populated dynamically with devices -->
          </div>
        </div>
      </div>

      <div class="button-section">
        <button class="button" id="btn-1" onclick="sendButton(1)">Toggle Status Requests</button>
        <button class="button" id="btn-2" onclick="sendButton(2)">...</button>
        <button class="button" id="btn-3" onclick="sendButton(3)">...</button>
        <button class="button" id="btn-4" onclick="sendButton(4)">...</button>
        <button class="button button-danger" id="btn-5" onclick="sendButton(5)">...</button>
        <button class="button button-danger" id="btn-6" onclick="sendButton(6)">...</button>
        <button class="button button-danger" id="btn-7" onclick="sendButton(7)">...</button>
      </div>

      <!-- File Upload Section -->
      <div class="file-drop-wrapper">
        <div id="fileDropArea" class="file-drop">
          <div class="file-drop-header">Upload file</div>

          <div class="file-drop-box">
            <label for="fileInput" class="file-drop-label">
              <div class="file-drop-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
              </div>

              <span class="file-drop-text">
                Drop files here or <span class="browse-text">Browse</span>
              </span>
            </label>

            <input type="file" id="fileInput" hidden />
          </div>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="system-section-wrapper">
        <button class="mini-monitor-btn" onclick="openMiniMonitor()" title="Detach monitor">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
        </button>
        <div class="system-section" id="systemContainer"></div>
      </div>
      <div class="console-section">
        <div class="console-header">
          <h3>Console</h3>
          <div class="console-filter">
            <button id="filterToggle" class="filter-toggle">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="21" x2="4" y2="14"></line>
                <line x1="4" y1="10" x2="4" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12" y2="3"></line>
                <line x1="20" y1="21" x2="20" y2="16"></line>
                <line x1="20" y1="12" x2="20" y2="3"></line>
                <line x1="1" y1="14" x2="7" y2="14"></line>
                <line x1="9" y1="8" x2="15" y2="8"></line>
                <line x1="17" y1="16" x2="23" y2="16"></line>
              </svg>
              Filter
            </button>
            <div id="filterMenu" class="filter-menu">
              <!-- Dynamically filled with checkboxes -->
            </div>
          </div>
        </div>
        <div id="consoleOutput" class="console-box"></div>
        <div id="commandPrompt">
          <input
            type="text"
            id="commandInput"
            placeholder="Enter command (e.g. reset)"
          />
          <button onclick="sendConsoleCommand()">Send</button>
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
