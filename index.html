<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server Command Console</title>
    <style>
      :root {
        --bg-light: #f5f5f5;
        --bg-white: #ffffff;
        --border: #dcdcdc;
        --text-dark: #333;
        --text-muted: #777;
        --primary: #0066ff;
        --primary-hover: #0052cc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, system-ui, sans-serif;
        background-color: var(--bg-light);
        color: var(--text-dark);
        display: flex;
        height: 100vh;
      }

      .sidebar {
        width: 35%;
        min-width: 280px;
        padding: 2rem;
        background-color: var(--bg-light);
        border-right: 1px solid var(--border);
      }

      .sidebar h2 {
        margin-bottom: 1.5rem;
        font-size: 1.4rem;
      }

      .button {
        display: block;
        width: 100%;
        padding: 0.75rem 1rem;
        margin-bottom: 1rem;
        background-color: var(--primary);
        color: white;
        font-size: 1rem;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .button:hover {
        background-color: var(--primary-hover);
      }

      .main {
        flex: 1;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        background-color: var(--bg-white);
      }

      .console-header {
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }

      .console-box {
        flex: 1;
        background-color: #fafafa;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 1rem;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        font-size: 0.9rem;
        white-space: pre-wrap;
        line-height: 1.5;
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
      }

      .vr-status {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
      }

      .vr-status h3 {
        margin-bottom: 1rem;
        font-size: 1.1rem;
      }

      .device {
        display: flex;
        justify-content: space-between;
        font-size: 0.95rem;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2>Server Actions</h2>
      <button class="button" onclick="send('status')">
        Check Server Status
      </button>
      <button class="button" onclick="send('restart')">Restart Service</button>
      <button class="button" onclick="send('update')">Update System</button>
    </div>

    <div class="vr-status">
      <h3>VR Battery Status</h3>
      <div class="device">
        <span>🎧 Headset:</span> <span id="headsetBattery">--%</span>
      </div>
      <div class="device">
        <span>🕹️ Left Controller:</span> <span id="leftBattery">--%</span>
      </div>
      <div class="device">
        <span>🕹️ Right Controller:</span> <span id="rightBattery">--%</span>
      </div>
    </div>

    <div class="main">
      <div class="console-header">Console Output</div>
      <div id="consoleOutput" class="console-box">Waiting for input...</div>
    </div>

    <script>
      function send(msg) {
        const output = document.getElementById("consoleOutput");

        fetch("cgi-bin/handler.py", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: "message=" + encodeURIComponent(msg),
        })
          .then((res) => res.text())
          .then((text) => {
            const timestamp = new Date().toLocaleTimeString();
            const existing =
              output.textContent === "Waiting for input..."
                ? ""
                : output.textContent;
            output.textContent = `${existing}\n[${timestamp}] ${msg}\n${text}`;
            output.scrollTop = output.scrollHeight;
          })
          .catch((err) => {
            const timestamp = new Date().toLocaleTimeString();
            output.textContent += `\n[${timestamp}] ❌ ERROR: ${err}`;
            output.scrollTop = output.scrollHeight;
          });
      }
      function fetchBatteryStatus() {
        fetch("cgi-bin/handler.py?vr_status=1")
          .then((res) => res.json())
          .then((data) => {
            document.getElementById(
              "headsetBattery"
            ).textContent = `${data.headset}%`;
            document.getElementById(
              "leftBattery"
            ).textContent = `${data.left}%`;
            document.getElementById(
              "rightBattery"
            ).textContent = `${data.right}%`;
          })
          .catch((err) => {
            document.getElementById("headsetBattery").textContent = "--%";
            document.getElementById("leftBattery").textContent = "--%";
            document.getElementById("rightBattery").textContent = "--%";
          });
      }

      // Call once immediately and every 10 seconds after
      fetchBatteryStatus();
      setInterval(fetchBatteryStatus, 10000);
    </script>
  </body>
</html>
